services:
  rugram:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Данные приложения (SQLite)
      - ./instance:/app/instance
      # Загруженные изображения
      - ./uploads:/app/app/static/uploads
    env_file:
      - .env
    networks:
      - rugram-net

networks:
  rugram-net:
    external: true
