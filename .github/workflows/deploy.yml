name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: production
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --cov=app --cov-report=term-missing
        env:
          SECRET_KEY: ci-secret-key-for-testing

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/rugram

            echo "==> Ensuring Docker network exists..."
            docker network inspect rugram-net >/dev/null 2>&1 || docker network create rugram-net

            echo "==> Syncing code to latest..."
            git fetch origin main
            git reset --hard origin/main

            echo "==> Ensuring volume directories exist..."
            mkdir -p instance uploads

            echo "==> Fixing volume permissions for non-root container user..."
            docker run --rm -v /opt/rugram/instance:/instance -v /opt/rugram/uploads:/uploads alpine chown -R 1000:1000 /instance /uploads 2>/dev/null || true

            echo "==> Building and restarting Docker container..."
            docker compose build rugram
            docker compose up -d rugram

            echo "==> Deploy complete!"
