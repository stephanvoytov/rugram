name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: production
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/rugram

            echo "==> Stashing local changes and pulling latest code..."
            git stash --include-untracked || true
            git pull origin main

            echo "==> Building and restarting Docker container..."
            docker compose build rugram
            docker compose up -d rugram

            echo "==> Running database migrations..."
            sleep 3
            docker compose exec -T rugram alembic upgrade head || echo "Migration may have already been applied"

            echo "==> Deploy complete!"
