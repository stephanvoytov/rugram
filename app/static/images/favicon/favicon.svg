<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#181825"/>
      <stop offset="100%" stop-color="#11111b"/>
    </linearGradient>
  </defs>
  <!-- Dark rounded square -->
  <rect x="4" y="4" width="88" height="88" rx="18" ry="18" fill="url(#bg)" stroke="#313244" stroke-width="2"/>
  <!-- Terminal prompt ">" indicator -->
  <text x="24" y="62" font-family="'JetBrains Mono','Consolas',monospace" font-size="52" font-weight="700" fill="#89b4fa" letter-spacing="-2">R</text>
  <!-- Blinking cursor -->
  <rect x="66" y="22" width="8" height="52" rx="2" fill="#a6e3a1" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.1;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
