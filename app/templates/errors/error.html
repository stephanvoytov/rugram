<!DOCTYPE html>
<html lang="{{ current_lang or 'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{{ code }} · rugram</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/favicon/favicon.svg') }}">
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
    window.__INITIAL_DATA__ = {
        static_version: '1',
    };
    </script>
    <style>
        :root {
            --bg: #11111b;
            --surface: #181825;
            --surface2: #1e1e2e;
            --overlay: #313244;
            --fg: #cdd6f4;
            --text: #cdd6f4;
            --subtext: #a6adc8;
            --blue: #89b4fa;
            --green: #a6e3a1;
            --red: #f38ba8;
            --peach: #fab387;
            --yellow: #f9e2af;
            --mauve: #cba6f7;
            --accent: #89b4fa;
            --font: 'JetBrains Mono', 'Consolas', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .error-box {
            max-width: 580px;
            width: 100%;
            border: 2px solid var(--overlay);
            border-radius: 12px;
            overflow: hidden;
        }
        .error-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--overlay);
            font-size: 0.8rem;
            color: var(--subtext);
            user-select: none;
        }
        .error-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .error-dot.red { background: #f38ba8; }
        .error-dot.yellow { background: #f9e2af; }
        .error-dot.green { background: #a6e3a1; }
        .error-body {
            padding: 40px 32px;
            background: var(--bg);
        }
        .error-code {
            color: var(--red);
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 8px;
        }
        .error-name {
            color: var(--peach);
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .error-message {
            color: var(--subtext);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 28px;
            padding: 12px 16px;
            background: var(--surface2);
            border-left: 3px solid var(--red);
            border-radius: 4px;
        }
        .error-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .error-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            font-family: var(--font);
            font-size: 0.85rem;
            text-decoration: none;
            border-radius: 6px;
            transition: all 0.15s;
            cursor: pointer;
            border: 1px solid var(--overlay);
            background: var(--surface);
            color: var(--text);
        }
        .error-btn:hover {
            background: var(--surface2);
            border-color: var(--accent);
            color: var(--accent);
        }
        .error-btn.primary {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }
        .error-btn.primary:hover {
            background: var(--blue);
        }
        .error-cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background: var(--green);
            margin-left: 4px;
            animation: blink 1.2s step-end infinite;
            vertical-align: text-bottom;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
        .error-ascii {
            color: var(--overlay);
            font-size: 0.65rem;
            line-height: 1.3;
            margin-bottom: 24px;
            white-space: pre;
            user-select: none;
        }
        @media (max-width: 480px) {
            .error-body { padding: 28px 20px; }
            .error-code { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <div class="error-box">
        <div class="error-bar">
            <span class="error-dot red"></span>
            <span class="error-dot yellow"></span>
            <span class="error-dot green"></span>
            <span style="margin-left:auto">rugram — {{ code }} {{ name }}</span>
        </div>
        <div class="error-body">
            <div class="error-code">{{ code }}</div>
            <div class="error-name">> {{ name }}</div>
            <div class="error-message">{{ message }}</div>
            <div class="error-actions">
                <a href="javascript:history.back()" class="error-btn">← go back</a>
                <a href="{{ url_for('main.index') }}" class="error-btn primary">~ go home</a>
            </div>
            <div style="margin-top: 24px; color: var(--overlay); font-size: 0.75rem;">
                <span class="error-cursor"></span>
            </div>
        </div>
    </div>
</body>
</html>
