{% extends "base.html" %}
{% block content %}
<div class="container mt-4 pb-4">
    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">
                        <i class="bi bi-camera me-2"></i>Сменить аватар
                    </h4>
                </div>
                <div class="card-body text-center">
                    <form method="POST" enctype="multipart/form-data">
                        {{ form.hidden_tag() }}

                        <!-- Текущий аватар -->
                        <div class="mb-3">
                            <img src="{{ url_for('static', filename='uploads/profile_images/' + current_user.profile_image) if current_user.profile_image else url_for('static', filename='default-profile.png') }}"
                                 class="rounded-circle border border-3 border-primary object-fit-cover mb-2"
                                 width="120" height="120" alt="Аватар">
                            <p class="text-muted small mb-0">{{ current_user.username }}</p>
                        </div>

                        <!-- Выбор файла -->
                        <div class="mb-3">
                            {{ form.profile_image(class="form-control") }}
                            {% for error in form.profile_image.errors %}
                            <div class="text-danger small mt-1">{{ error }}</div>
                            {% endfor %}
                            <small class="text-muted">Поддерживаются JPG и PNG</small>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-upload me-2"></i>Загрузить
                        </button>
                    </form>
                </div>
                <div class="card-footer text-center">
                    <a href="{{ url_for('main.profile', user_id_or_username=current_user.username) }}" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-arrow-left me-1"></i>Назад к профилю
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
