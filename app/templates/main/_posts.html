{% import 'macros/_post_card.html' as macros %}
{% for post in posts %}
{% call macros.render_post(post, current_user) %}{% endcall %}
{% else %}
<div class="empty-state">
    <span style="color:var(--subtle)">no posts found</span>
    <div class="hint">[*] Be the first to <a href="{{ url_for('posts.create_post') }}">[create a post]</a></div>
</div>
{% endfor %}
