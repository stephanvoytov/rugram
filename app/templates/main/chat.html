{% extends "base.html" %}

{% block title %}chat — Rugram{% endblock %}

{% block styles %}
<style>
/* Full-width chat: override Bootstrap container */
#mainContainer.container { max-width: 100% !important; padding: 0 !important; display: flex; flex-direction: column; flex: 1; min-height: 0; }
/* Keep flash messages padded */
#mainContainer .alert { margin: 12px 16px !important; }
</style>
{% endblock %}

{% block content %}
<div class="chat-layout">
    <!-- Chat list column -->
    <div class="chat-list-col" id="chatListColumn">
        <div class="chat-list-header">
            <span><b>[chats]</b></span>
            <button class="btn-term" id="newChatBtnLeft">[+ new]</button>
        </div>
        <div class="chat-list-scroll" id="chatList">
            <div class="text-center py-5" style="color:var(--subtle)">{{ _('Loading...') }}</div>
        </div>
    </div>

    <!-- Chat detail column -->
    <div class="chat-detail-col" id="chatDetailColumn">
        <!-- Active chat area -->
        <div class="d-none flex-column flex-grow-1" id="chatArea">
            <div class="chat-detail-header">
                <button class="btn-term" id="chatBackBtn" title="Back">[&larr;]</button>
                <img id="chatAvatar" src="" alt="avatar" width="32" height="32" class="chat-avatar"
                     onerror="this.src='{{ url_for('static', filename='default-profile.png') }}'">
                <div>
                    <span id="chatUsername" style="font-weight:600"></span>
                    <small id="chatStatus" style="color:var(--subtle)"></small>
                </div>
            </div>

            <div class="chat-messages" id="messagesContainer"></div>

            <div class="chat-input-area">
                <form id="messageForm" style="display:flex;gap:4px;flex:1">
                    <input type="text" id="messageInput" class="chat-input" placeholder="{{ _('Type a message...') }}" autocomplete="off">
                    <button type="submit" class="btn-term primary">[>>]</button>
                </form>
            </div>
        </div>

        <!-- Empty state -->
        <div class="d-flex flex-column align-items-center justify-content-center flex-grow-1" id="noChatSelected">
            <span style="font-size:2rem;color:var(--subtle);font-family:var(--font)">[✉]</span>
            <div style="margin-top:12px;color:var(--fg)">select a chat</div>
            <div style="font-size:0.8rem;color:var(--subtle)">or start a new one</div>
        </div>
    </div>
</div>

<!-- New chat modal -->
<div class="modal-overlay d-none" id="newChatModal" style="position:fixed;inset:0;z-index:1050;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center">
    <div class="modal-box">
        <div class="modal-box-header">
            <span><b>[new chat]</b></span>
            <button class="btn-term" onclick="document.getElementById('newChatModal').classList.add('d-none')">&times;</button>
        </div>
        <div class="modal-box-body" style="padding:12px">
            <div style="display:flex;gap:4px;margin-bottom:8px">
                <input type="text" class="chat-input" id="newChatUsername" placeholder="{{ _('Search users...') }}" autocomplete="off" style="flex:1">
                <button class="btn-term" id="searchUserBtn">[search]</button>
            </div>
            <div id="searchResults"></div>
        </div>
        <div class="modal-box-footer" style="padding:8px 12px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:4px">
            <button class="btn-term" onclick="document.getElementById('newChatModal').classList.add('d-none')">[cancel]</button>
            <button class="btn-term primary" id="startChatBtn" disabled>[start]</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentChatId = null;
let pollingInterval = null;
let currentUser = null;
let hasMoreMessages = true;
let isLoadingOlder = false;
let typingTimeout = null;
let otherUsername = '';

document.addEventListener('DOMContentLoaded', function() {
    currentUser = {{ current_user.id|tojson if current_user.is_authenticated else 'null' }};
    if (!currentUser) { window.location.href = '{{ url_for("auth.login") }}'; return; }
    loadChatList();
    startChatListPolling();

    const urlParams = new URLSearchParams(window.location.search);
    const targetUser = urlParams.get('user');
    if (targetUser) {
        const waitAndOpen = setInterval(async () => {
            const chatItem = document.querySelector(`[data-username="${targetUser}"]`);
            if (chatItem) { clearInterval(waitAndOpen); chatItem.click(); return; }
            try {
                const resp = await fetch('{{ url_for('main.chat_start', username='') }}' + targetUser, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').content } });
                const data = await resp.json();
                if (data.chat_id) { clearInterval(waitAndOpen); setTimeout(() => { const newItem = document.querySelector(`[data-username="${targetUser}"]`); if (newItem) newItem.click(); }, 500); }
            } catch (e) {}
        }, 1000);
        setTimeout(() => clearInterval(waitAndOpen), 15000);
    }

    // Restore last selected chat after reload
    const savedChatId = localStorage.getItem('rugram_chat_id');
    if (savedChatId) {
        const waitForRestore = setInterval(() => {
            const item = document.querySelector(`[data-chat-id="${savedChatId}"]`);
            if (item) { clearInterval(waitForRestore); item.click(); }
        }, 200);
        setTimeout(() => clearInterval(waitForRestore), 10000);
    }

    setupTypingSignal();
    document.getElementById('messageForm').addEventListener('submit', sendMessage);
    document.getElementById('messagesContainer').addEventListener('scroll', function() {
        if (this.scrollTop < 80 && hasMoreMessages && !isLoadingOlder) loadOlderMessages();
    });
    document.getElementById('newChatBtnLeft').addEventListener('click', () => { document.getElementById('newChatModal').classList.remove('d-none'); });
    document.getElementById('searchUserBtn').addEventListener('click', searchUser);
    document.getElementById('newChatUsername').addEventListener('keypress', function(e) { if (e.key === 'Enter') searchUser(); });
    document.getElementById('startChatBtn').addEventListener('click', startNewChat);
    document.getElementById('chatBackBtn').addEventListener('click', closeChatMobile);
});

async function loadChatList() {
    try {
        const response = await fetch('{{ url_for('main.chat_list') }}');
        const data = await response.json();
        updateChatList(data.chats);
    } catch (error) {
        console.error('Error loading chat list:', error);
        document.getElementById('chatList').innerHTML = '<div class="text-center py-5" style="color:var(--red)">{{ _('Error loading chats') }}</div>';
    }
}

function updateChatList(chats) {
    const chatList = document.getElementById('chatList');
    if (!chatList) return;
    const scrollPos = chatList.scrollTop;
    chatList.innerHTML = '';
    if (chats.length === 0) {
        chatList.innerHTML = '<div class="text-center py-5"><span style="color:var(--subtle)">{{ _('No chats yet') }}</span></div>';
        return;
    }
    chats.forEach(chat => { chatList.appendChild(createChatItem(chat)); });
    if (currentChatId) {
        const activeItem = chatList.querySelector(`[data-chat-id="${currentChatId}"]`);
        if (activeItem) activeItem.classList.add('active');
    }
    chatList.scrollTop = scrollPos;
}

function createChatItem(chat) {
    const div = document.createElement('div');
    div.className = 'chat-item' + (currentChatId === chat.chat_id ? ' active' : '');
    div.dataset.chatId = chat.chat_id;
    div.dataset.username = chat.other_user.username;

    const unreadBadge = chat.unread_count > 0 ? ' <span class="notif-badge" style="position:static;display:inline;font-size:0.7rem">' + chat.unread_count + '</span>' : '';
    const onlineDot = chat.other_user.is_online ? ' <span style="color:var(--green)">●</span>' : '';

    div.innerHTML = '<div style="display:flex;align-items:center;gap:8px">'
        + '<img src="' + (chat.other_user.profile_image ? '{{ url_for('static', filename='uploads/profile_images/') }}' + chat.other_user.profile_image : '{{ url_for('static', filename='default-profile.png') }}') + '" alt="' + chat.other_user.username + ' avatar" width="36" height="36" class="chat-avatar" onerror="this.src=\'{{ url_for('static', filename='default-profile.png') }}\'">'
        + '<div style="flex:1;min-width:0">'
        + '<div style="display:flex;justify-content:space-between;align-items:baseline"><span style="font-weight:600">' + chat.other_user.username + '</span>' + onlineDot + '<small style="color:var(--subtle);font-size:0.7rem">' + formatDate(chat.last_message_date) + '</small></div>'
        + '<div style="color:var(--subtle);font-size:0.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + escapeHtml(chat.last_message || 'no messages') + '</div>'
        + '</div>' + unreadBadge + '</div>';

    div.addEventListener('click', () => selectChat(chat.chat_id, chat.other_user));
    return div;
}

async function selectChat(chatId, otherUser) {
    currentChatId = chatId;
    otherUsername = otherUser.username;
    localStorage.setItem('rugram_chat_id', chatId);
    document.querySelectorAll('.chat-item').forEach(item => item.classList.remove('active'));
    const activeEl = document.querySelector('[data-chat-id="' + chatId + '"]');
    if (activeEl) activeEl.classList.add('active');

    document.getElementById('chatArea').classList.remove('d-none');
    document.getElementById('chatArea').classList.add('d-flex');
    document.getElementById('noChatSelected').classList.add('d-none');

    const avatarEl = document.getElementById('chatAvatar');
    avatarEl.src = otherUser.profile_image ? '{{ url_for('static', filename='uploads/profile_images/') }}' + otherUser.profile_image : '{{ url_for('static', filename='default-profile.png') }}';
    avatarEl.onerror = function() { this.src = '{{ url_for('static', filename='default-profile.png') }}'; };
    avatarEl.style.cursor = 'pointer';
    avatarEl.onclick = function() { window.location.href = '{{ url_for('main.profile', user_id_or_username='') }}' + otherUser.username; };

    const usernameEl = document.getElementById('chatUsername');
    usernameEl.textContent = otherUser.username;
    usernameEl.style.cursor = 'pointer';
    usernameEl.onclick = function() { window.location.href = '{{ url_for('main.profile', user_id_or_username='') }}' + otherUser.username; };
    updateChatStatus(otherUser.is_online, otherUser.last_seen);
    showChatOnMobile();
    await loadMessages();
    startPolling();
}

function setupTypingSignal() {
    const input = document.getElementById('messageInput');
    input.addEventListener('input', function() {
        if (!currentChatId) return;
        if (typingTimeout) return;
        typingTimeout = setTimeout(() => { typingTimeout = null; }, 3000);
        fetch('{{ url_for('main.chat_typing', chat_id=0) }}'.replace('/0/', '/' + currentChatId + '/'), { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').content } }).catch(() => {});
    });
}

function updateChatStatus(isOnline, lastSeen) {
    const statusEl = document.getElementById('chatStatus');
    statusEl.innerHTML = isOnline ? '<span style="color:var(--green)">online</span>' : (lastSeen || 'offline');
}

function updateTypingIndicator(isTyping) {
    const statusEl = document.getElementById('chatStatus');
    const typingEl = document.getElementById('typingIndicator');
    if (isTyping) {
        if (!typingEl) {
            const el = document.createElement('small');
            el.id = 'typingIndicator';
            el.style.cssText = 'color:var(--green)';
            el.textContent = 'typing...';
            statusEl.parentElement.appendChild(el);
        }
        statusEl.style.display = 'none';
    } else {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
        statusEl.style.display = '';
    }
}

async function loadMessages() {
    if (!currentChatId) return;
    try {
        const response = await fetch('{{ url_for('main.chat_messages', chat_id=0) }}'.replace('/0/', '/' + currentChatId + '/') + '?limit=50');
        const data = await response.json();
        if (data.other_user) updateChatStatus(data.other_user.is_online, data.other_user.last_seen);
        updateTypingIndicator(data.is_typing);
        hasMoreMessages = data.has_more;
        const container = document.getElementById('messagesContainer');
        container.innerHTML = '';
        appendMessages(container, data.messages);
        container.scrollTop = container.scrollHeight;
    } catch (error) { console.error('Error loading messages:', error); }
}

async function loadOlderMessages() {
    if (!currentChatId || !hasMoreMessages || isLoadingOlder) return;
    isLoadingOlder = true;
    const container = document.getElementById('messagesContainer');
    const firstMsg = container.querySelector('.message-item');
    if (!firstMsg) { isLoadingOlder = false; return; }
    const firstMsgId = parseInt(firstMsg.dataset.messageId);

    const loader = document.createElement('div');
    loader.className = 'text-center py-2';
    loader.id = 'olderLoader';
    loader.innerHTML = '<span style="color:var(--subtle)">{{ _('Loading...') }}</span>';
    container.insertBefore(loader, container.firstChild);

    try {
        const response = await fetch('{{ url_for('main.chat_messages', chat_id=0) }}'.replace('/0/', '/' + currentChatId + '/') + '?before=' + firstMsgId + '&limit=30');
        const data = await response.json();
        loader.remove();
        if (data.messages.length === 0) { hasMoreMessages = false; isLoadingOlder = false; return; }
        hasMoreMessages = data.has_more;
        const prevScrollHeight = container.scrollHeight;
        appendMessages(container, data.messages, true);
        container.scrollTop = container.scrollHeight - prevScrollHeight;
    } catch (error) {
        console.error('Error loading older messages:', error);
        const existing = document.getElementById('olderLoader');
        if (existing) existing.remove();
    }
    isLoadingOlder = false;
}

function appendMessages(container, messages, prepend) {
    prepend = prepend || false;
    let lastDate = null;
    if (prepend && container.firstChild) {
        const firstExisting = container.querySelector('.message-item');
        if (firstExisting) lastDate = getMessageDate(firstExisting.dataset.messageDate);
    }
    const msgs = prepend ? [...messages].reverse() : messages;
    msgs.forEach(message => {
        const msgDate = getMessageDate(message.created_date);
        if (!lastDate || msgDate !== lastDate) {
            if (prepend) container.insertBefore(createDateDivider(msgDate), container.firstChild);
            else container.appendChild(createDateDivider(msgDate));
            lastDate = msgDate;
        }
        const messageDiv = createMessageElement(message);
        if (prepend) container.insertBefore(messageDiv, container.firstChild);
        else container.appendChild(messageDiv);
    });
}

function getMessageDate(isoDate) {
    const date = new Date(isoDate);
    const today = new Date();
    const yesterday = new Date(today);
    yesterday.setDate(yesterday.getDate() - 1);
    if (date.toDateString() === today.toDateString()) return 'today';
    if (date.toDateString() === yesterday.toDateString()) return 'yesterday';
    return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
}

function createDateDivider(text) {
    const div = document.createElement('div');
    div.className = 'text-center my-2';
    div.innerHTML = '<span style="color:var(--subtle);font-size:0.7rem">-- ' + text + ' --</span>';
    return div;
}

function createMessageElement(message) {
    const div = document.createElement('div');
    const isOwn = message.author.id === currentUser;
    div.className = 'message-item ' + (isOwn ? 'own' : 'other');
    div.dataset.messageId = message.id;
    div.dataset.messageDate = message.created_date;
    const time = formatTime(message.created_date);
    const readIcon = isOwn ? (message.is_read
        ? '<span style="color:var(--accent);font-size:0.6rem;margin-left:3px">✓✓</span>'
        : '<span style="color:var(--subtle);font-size:0.6rem;margin-left:3px">✓</span>')
        : '';
    div.innerHTML = '<div class="msg-bubble ' + (isOwn ? 'own' : 'other') + '">'
        + '<span>' + escapeHtml(message.text) + '</span>'
        + '<div style="display:flex;align-items:center;gap:2px;justify-content:flex-end">'
        + '<small style="opacity:0.6;font-size:0.65rem;white-space:nowrap">' + time + '</small>'
        + readIcon
        + '</div>'
        + '</div>';
    return div;
}

async function sendMessage(e) {
    e.preventDefault();
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text || !currentChatId) return;
    try {
        const response = await fetch('{{ url_for('main.chat_send', chat_id=0) }}'.replace('/0/', '/' + currentChatId + '/'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').content },
            body: JSON.stringify({ text })
        });
        if (response.ok) { input.value = ''; await loadMessages(); }
    } catch (error) { console.error('Error sending message:', error); }
}

async function searchUser() {
    const username = document.getElementById('newChatUsername').value.trim();
    if (!username) return;
    try {
        const response = await fetch('{{ url_for('main.search_users') }}' + '?q=' + encodeURIComponent(username));
        const data = await response.json();
        const results = document.getElementById('searchResults');
        results.innerHTML = '';
        if (data.users.length === 0) { results.innerHTML = '<span style="color:var(--subtle)">{{ _('User not found') }}</span>'; return; }
        data.users.forEach(user => {
            if (user.id !== currentUser) {
                const userDiv = document.createElement('div');
                userDiv.className = 'search-result';
                userDiv.dataset.username = user.username;
                userDiv.innerHTML = '<img src="' + (user.profile_image ? '{{ url_for('static', filename='uploads/profile_images/') }}' + user.profile_image : '{{ url_for('static', filename='default-profile.png') }}') + '" alt="' + user.username + ' avatar" width="24" height="24" class="chat-avatar" onerror="this.src=\'{{ url_for('static', filename='default-profile.png') }}\'"> <span>' + user.username + '</span>';
                userDiv.addEventListener('click', () => selectUserForChat(user));
                results.appendChild(userDiv);
            }
        });
    } catch (error) { console.error('Error searching user:', error); }
}

function selectUserForChat(user) {
    document.querySelectorAll('.search-result').forEach(el => el.classList.remove('selected'));
    const selected = document.querySelector('.search-result[data-username="' + user.username + '"]');
    if (selected) selected.classList.add('selected');
    document.getElementById('newChatUsername').value = user.username;
    document.getElementById('startChatBtn').disabled = false;
}

async function startNewChat() {
    const username = document.getElementById('newChatUsername').value.trim();
    if (!username) return;
    document.querySelectorAll('.search-result').forEach(el => el.classList.remove('selected'));
    try {
        const response = await fetch('{{ url_for('main.chat_start', username='') }}' + username, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').content }
        });
        if (response.ok) {
            const data = await response.json();
            document.getElementById('newChatModal').classList.add('d-none');
            await loadChatList();
            const chatsResponse = await fetch('{{ url_for('main.chat_list') }}');
            const chatsData = await chatsResponse.json();
            const newChat = chatsData.chats.find(chat => chat.chat_id === data.chat_id);
            if (newChat) selectChat(data.chat_id, newChat.other_user);
        } else { const err = await response.json(); console.error('Error starting chat:', err.error || err); }
    } catch (error) { console.error('Error starting chat:', error); }
}

function isMobile() { return window.innerWidth < 768; }

function showChatOnMobile() {
    if (!isMobile()) return;
    document.getElementById('chatListColumn').classList.add('d-none');
    document.getElementById('chatDetailColumn').classList.add('active-column');
}

function closeChatMobile() {
    if (!isMobile()) return;
    document.getElementById('chatListColumn').classList.remove('d-none');
    document.getElementById('chatDetailColumn').classList.remove('active-column');
    document.getElementById('chatArea').classList.remove('d-flex');
    document.getElementById('chatArea').classList.add('d-none');
    document.getElementById('noChatSelected').classList.remove('d-none');
    if (pollingInterval) { clearInterval(pollingInterval); pollingInterval = null; }
    currentChatId = null;
    loadChatList();
}

let chatListPollInterval = null;
let prevChats = {};
let isFirstChatLoad = true;

function startChatListPolling() {
    if (chatListPollInterval) clearInterval(chatListPollInterval);
    chatListPollInterval = setInterval(async () => {
        try {
            const response = await fetch('{{ url_for('main.chat_list') }}');
            const data = await response.json();
            if (isFirstChatLoad) {
                isFirstChatLoad = false;
                data.chats.forEach(chat => { prevChats[chat.chat_id] = { last_message: chat.last_message, last_message_date: chat.last_message_date }; });
                updateChatList(data.chats);
                return;
            }
            data.chats.forEach(chat => {
                const prev = prevChats[chat.chat_id];
                if (!chat.other_user) return;
                const isNewMessage = prev && prev.last_message !== chat.last_message;
                const isNewChat = !prev && chat.last_message;
                if ((isNewMessage || isNewChat) && chat.other_user) {
                    if (window.showBrowserNotification) window.showBrowserNotification(chat.other_user.username, chat.last_message);
                }
            });
            data.chats.forEach(chat => { prevChats[chat.chat_id] = { last_message: chat.last_message, last_message_date: chat.last_message_date }; });
            updateChatList(data.chats);
        } catch (error) { console.error('Error polling chat list:', error); }
    }, 5000);
}

function stopChatListPolling() {
    if (chatListPollInterval) { clearInterval(chatListPollInterval); chatListPollInterval = null; }
}

function startPolling() {
    if (pollingInterval) clearInterval(pollingInterval);
    pollingInterval = setInterval(async () => { if (currentChatId) await loadMessages(); }, 3000);
}

function formatDate(dateString) {
    if (!dateString) return '';
    const date = new Date(dateString);
    const now = new Date();
    const diff = now - date;
    if (diff < 60000) return 'now';
    if (diff < 3600000) return Math.floor(diff / 60000) + 'm';
    if (diff < 86400000) return Math.floor(diff / 3600000) + 'h';
    if (diff < 604800000) return Math.floor(diff / 86400000) + 'd';
    return date.toLocaleDateString('ru-RU');
}

function formatTime(dateString) {
    return new Date(dateString).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
{% endblock %}
