{% extends "base.html" %}

{% block title %}notifications — Rugram{% endblock %}

{% block content %}
<div class="terminal-box" style="max-width:600px;margin:20px auto">
    <div class="auth-header" style="justify-content:space-between">
        <span>
            <span class="auth-title">[notifications]</span>
            <span class="auth-subtitle">notifications</span>
        </span>
        <button class="btn-term" id="markAllReadBtn">[mark all read]</button>
    </div>

    <div id="notificationsLoading" class="text-center" style="padding:40px;color:var(--subtle)">{{ _('Loading...') }}</div>

    <div id="notificationsEmpty" class="text-center" style="padding:40px;color:var(--subtle);display:none">
        <span style="font-size:2rem">[📭]</span>
        <div style="margin-top:8px">{{ _('No notifications') }}</div>
    </div>

    <div id="notificationsList"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadNotifications() {
    try {
        const r = await fetch('{{ url_for('main.notifications_list') }}');
        const data = await r.json();
        document.getElementById('notificationsLoading').style.display = 'none';
        if (data.notifications.length === 0) {
            document.getElementById('notificationsEmpty').style.display = 'block';
            return;
        }
        const list = document.getElementById('notificationsList');
        list.innerHTML = '';
        data.notifications.forEach(function(n) { list.insertAdjacentHTML('beforeend', renderNotification(n)); });
    } catch (e) {
        console.error('Error loading notifications:', e);
        document.getElementById('notificationsLoading').innerHTML = '<span style="color:var(--red)">error loading notifications</span>';
    }
}

function renderNotification(n) {
    const actor = n.actor.username;
    const profileUrl = '{{ url_for('main.profile', user_id_or_username='') }}' + n.actor.id;
    const postUrl = n.post_id ? '{{ url_for('posts.get_post', post_id=0) }}'.replace('/0', '/' + n.post_id) : null;
    let msg = '', icon = '';
    switch (n.type) {
        case 'like': msg = '<a href="' + profileUrl + '">' + actor + '</a> liked'; icon = '[♥]'; break;
        case 'comment': msg = '<a href="' + profileUrl + '">' + actor + '</a> commented'; icon = '[💬]'; break;
        case 'follow': msg = '<a href="' + profileUrl + '">' + actor + '</a> followed you'; icon = '[+]'; break;
        default: msg = actor; icon = '[*]';
    }
    if (postUrl) msg += ' <a href="' + postUrl + '">your post</a>';
    return '<div class="post-card nf-item ' + (n.is_read ? '' : 'unread') + '" data-id="' + n.id + '">'
        + '<div class="post-header" style="justify-content:space-between">'
        + '<span>' + icon + ' ' + msg + '</span>'
        + '<small style="color:var(--subtle);font-size:0.7rem">' + formatDate(n.created_date) + '</small>'
        + '</div>'
        + (!n.is_read ? '<div style="padding:4px 0"><button class="btn-term mark-read-btn" data-id="' + n.id + '" style="font-size:0.7rem">[read]</button></div>' : '')
        + '</div>';
}

function formatDate(dateString) {
    const date = new Date(dateString);
    const now = new Date();
    const diff = now - date;
    if (diff < 60000) return 'now';
    if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
    if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
    return date.toLocaleDateString('ru-RU');
}

async function markRead(id) {
    try {
        const r = await fetch('{{ url_for('main.notification_mark_read', notification_id=0) }}'.replace('/0/', '/' + id + '/'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').content }
        });
        if (r.ok) {
            const el = document.querySelector('[data-id="' + id + '"]');
            if (el) { el.classList.remove('unread'); const btn = el.querySelector('.mark-read-btn'); if (btn) btn.remove(); }
            updateBadge();
        }
    } catch (e) { console.error(e); }
}

async function markAllRead() {
    try {
        const r = await fetch('{{ url_for('main.notifications_mark_all_read') }}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').content }
        });
        if (r.ok) {
            document.querySelectorAll('.nf-item').forEach(function(el) {
                el.classList.remove('unread');
                const btn = el.querySelector('.mark-read-btn');
                if (btn) btn.remove();
            });
            updateBadge();
        }
    } catch (e) { console.error(e); }
}

async function updateBadge() {
    try {
        const r = await fetch('{{ url_for('main.notifications_unread_count') }}');
        const data = await r.json();
        const badge = document.getElementById('notificationBadge');
        if (badge) { badge.textContent = data.count > 0 ? data.count : ''; badge.style.display = data.count > 0 ? 'inline' : 'none'; }
    } catch (e) {}
}

document.addEventListener('DOMContentLoaded', function() {
    loadNotifications();
    document.getElementById('markAllReadBtn').addEventListener('click', markAllRead);
    document.addEventListener('click', function(e) {
        const btn = e.target.closest('.mark-read-btn');
        if (btn) { e.preventDefault(); markRead(btn.dataset.id); }
    });
    updateBadge();
});
</script>
{% endblock %}
